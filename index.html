<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCPack · Portal BI</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --border: #dde1e8;
    --navy: #1a2a4a;
    --navy2: #243557;
    --red: #c0392b;
    --text: #1a2a4a;
    --muted: #7f8c9a;
    --danger: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

  /* ════ LOGIN ════ */
  #login-screen { min-height: 100vh; display: flex; }

  .login-left {
    flex: 1; background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px; position: relative; overflow: hidden;
  }
  .login-left::before {
    content: ''; position: absolute;
    width: 480px; height: 480px; border-radius: 50%;
    border: 55px solid rgba(192,57,43,0.13);
    top: -110px; right: -110px;
  }
  .login-left::after {
    content: ''; position: absolute;
    width: 280px; height: 280px; border-radius: 50%;
    border: 36px solid rgba(255,255,255,0.04);
    bottom: -70px; left: -50px;
  }
  .login-left-content { position: relative; z-index: 1; text-align: center; }
  .login-left-content img { height: 54px; filter: brightness(0) invert(1); margin-bottom: 40px; display: block; margin-left: auto; margin-right: auto; }
  .login-left-content h2 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .login-left-content p { color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.75; max-width: 300px; }
  .login-accent { width: 44px; height: 4px; background: var(--red); border-radius: 2px; margin: 36px auto 0; }

  .login-right {
    width: 460px; background: var(--white);
    display: flex; align-items: center; justify-content: center;
    padding: 60px 48px;
  }
  .login-form { width: 100%; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .login-form h1 { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
  .login-form .sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
  .field input {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 9px;
    padding: 13px 16px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(26,42,74,0.08); }
  .field input::placeholder { color: #b0bac5; }

  #error-msg {
    background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.22);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: var(--danger);
    margin-bottom: 16px; display: none;
  }
  .btn-login {
    width: 100%; background: var(--navy); color: #fff; border: none;
    border-radius: 9px; padding: 14px;
    font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    margin-top: 6px; letter-spacing: 0.02em;
  }
  .btn-login:hover { background: var(--navy2); }
  .btn-login:active { transform: scale(0.98); }

  /* ════ PORTAL ════ */
  #portal-screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 54px;
    background: var(--navy); flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-left img { height: 26px; filter: brightness(0) invert(1); }
  .topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
  .topbar-label { font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 400; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px; padding: 5px 12px; font-size: 13px; color: rgba(255,255,255,0.8);
  }
  .user-badge strong { color: #fff; font-weight: 600; }
  .btn-logout {
    background: transparent; border: 1px solid rgba(255,255,255,0.18);
    border-radius: 7px; padding: 5px 14px;
    color: rgba(255,255,255,0.65); font-family: 'Inter', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: #ff6b6b; }

  .nav-bar {
    display: flex; align-items: center; gap: 2px;
    padding: 0 24px; height: 46px;
    background: var(--navy2); border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0; overflow-x: auto;
  }
  .nav-tab {
    background: transparent; border: none;
    padding: 6px 16px; border-radius: 6px;
    color: rgba(255,255,255,0.55); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: all 0.18s;
  }
  .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.07); }
  .nav-tab.active { background: var(--red); color: #fff; font-weight: 600; }

  .report-wrap {
    flex: 1; display: flex; flex-direction: column;
    padding: 16px 20px 16px; overflow: hidden;
    gap: 12px;
  }
  .report-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .report-title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; color: var(--navy); }
  .report-meta { font-size: 12px; color: var(--muted); }

  .iframe-wrapper {
    flex: 1; background: var(--white);
    border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; position: relative; min-height: 0;
  }
  .iframe-loader {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: var(--white); z-index: 2; transition: opacity 0.4s;
  }
  .loader-ring {
    width: 38px; height: 38px;
    border: 3px solid var(--border);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 13px; color: var(--muted); }

  #report-iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="login-screen">
  <div class="login-left">
    <div class="login-left-content">
      <img src="https://mcpack.com.br/wp-content/uploads/2023/08/logo_mcpack_25-14-2048x747.png" alt="MCPack" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
      <div id="logo-text" style="display:none; font-family:'Montserrat',sans-serif; font-size:28px; font-weight:800; color:#fff; margin-bottom:40px; letter-spacing:0.05em;">MCPACK</div>
      <h2>Portal de Business Intelligence</h2>
      <p>Dashboards e relatórios gerenciais para acompanhamento estratégico do negócio.</p>
      <div class="login-accent"></div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-form">
      <h1>Bem-vindo</h1>
      <p class="sub">Acesse com suas credenciais corporativas</p>
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="input-user" placeholder="seu.usuario" autocomplete="off" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="input-pass" placeholder="••••••••" />
      </div>
      <div id="error-msg">Usuário ou senha incorretos.</div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- ════ PORTAL ════ -->
<div id="portal-screen">
  <div class="topbar">
    <div class="topbar-left">
      <img src="https://mcpack.com.br/wp-content/uploads/2023/08/logo_mcpack_25-14-2048x747.png" alt="MCPack" onerror="this.style.display='none'">
      <div class="topbar-divider"></div>
      <span class="topbar-label">Portal BI</span>
    </div>
    <div class="topbar-right">
      <div class="user-badge">👤 <strong id="display-user"></strong></div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="nav-bar" id="nav-bar"></div>

  <div class="report-wrap">
    <div class="report-header">
      <div class="report-title" id="report-title">—</div>
      <div class="report-meta" id="report-meta"></div>
    </div>
    <div class="iframe-wrapper">
      <div class="iframe-loader" id="iframe-loader">
        <div class="loader-ring"></div>
        <div class="loader-text">Carregando dashboard...</div>
      </div>
      <iframe id="report-iframe" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
  const BASE = "https://app.powerbi.com/view?r=eyJrIjoiNzAxOTYxZjYtNDA4Ny00MDAzLWFmNDQtMjYxZmJjZmE4MDhhIiwidCI6ImY2NTA0ZGQ5LWY5NzYtNGFmMS1iYzljLWRmZWU2ZDI0YmI4MSJ9";

  // ── Usuários ──
  const USERS = {
    "lucas.souza": {
      senha: "8092",
      paginas: ["overview", "fluxo", "posvendas", "timeposvendas", "gestaovista"]
    }
  };

  // ── Páginas ──
  const PAGINAS = {
    overview:      { label: "Overview",                 pageName: "e591ba71b6a27e50985a" },
    fluxo:         { label: "Fluxo de Caixa",           pageName: "1e90ce82a6687a713181" },
    posvendas:     { label: "Menu Pós Vendas",          pageName: "258be3d50a1c8a77cacb" },
    timeposvendas: { label: "Análise Time Pós Vendas",  pageName: "7683b24b8cea7245bfee" },
    gestaovista:   { label: "Gestão à Vista",           pageName: "0b1ab3014e2bae93d062" }
  };

  let currentUser = null;
  let currentPage = null;

  // ── Sessão persistente ──
  function salvarSessao(user, page) {
    localStorage.setItem("mcpack_user", user);
    localStorage.setItem("mcpack_page", page || "");
  }

  function carregarSessao() {
    const user = localStorage.getItem("mcpack_user");
    const page = localStorage.getItem("mcpack_page");
    if (user && USERS[user]) {
      currentUser = user;
      iniciarPortal(page || null);
    }
  }

  // ── Login ──
  function doLogin() {
    const u = document.getElementById("input-user").value.trim();
    const p = document.getElementById("input-pass").value.trim();
    const err = document.getElementById("error-msg");
    if (USERS[u] && USERS[u].senha === p) {
      err.style.display = "none";
      currentUser = u;
      iniciarPortal(null);
    } else {
      err.style.display = "block";
    }
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  // ── Portal ──
  function iniciarPortal(paginaInicial) {
    document.getElementById("login-screen").style.display = "none";
    const portal = document.getElementById("portal-screen");
    portal.style.display = "flex";
    document.getElementById("display-user").textContent = currentUser;

    const nav = document.getElementById("nav-bar");
    nav.innerHTML = "";
    const paginas = USERS[currentUser].paginas;

    paginas.forEach(id => {
      const pg = PAGINAS[id];
      const btn = document.createElement("button");
      btn.className = "nav-tab";
      btn.textContent = pg.label;
      btn.dataset.id = id;
      btn.onclick = () => abrirPagina(id);
      nav.appendChild(btn);
    });

    // Restaura última página ou abre a primeira
    const target = paginaInicial && PAGINAS[paginaInicial] ? paginaInicial : paginas[0];
    abrirPagina(target);
  }

  function abrirPagina(id) {
    const pg = PAGINAS[id];
    if (!pg) return;
    currentPage = id;
    salvarSessao(currentUser, id);

    const url = BASE + "&pageName=" + pg.pageName;

    document.querySelectorAll(".nav-tab").forEach(b => b.classList.toggle("active", b.dataset.id === id));
    document.getElementById("report-title").textContent = pg.label;
    document.getElementById("report-meta").textContent = "Power BI · Link público";

    const loader = document.getElementById("iframe-loader");
    const iframe = document.getElementById("report-iframe");
    loader.style.opacity = "1";
    loader.style.display = "flex";
    iframe.src = url;

    iframe.onload = () => {
      setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.style.display = "none", 400);
      }, 1500);
    };
  }

  function doLogout() {
    localStorage.removeItem("mcpack_user");
    localStorage.removeItem("mcpack_page");
    currentUser = null;
    currentPage = null;
    document.getElementById("report-iframe").src = "";
    document.getElementById("portal-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("input-user").value = "";
    document.getElementById("input-pass").value = "";
  }

  // ── Inicializa ──
  carregarSessao();
</script>
</body>
</html>
